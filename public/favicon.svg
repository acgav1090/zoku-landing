<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0b10"/>
  <text x="16" y="22" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-weight="900" font-size="16" fill="#ff2d78" filter="url(#glow)">ゾク</text>
  <text x="16" y="22" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-weight="900" font-size="16" fill="#ffffff">ゾク</text>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>
</svg>
